<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status V2 — Bar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'JetBrains Mono', monospace; padding: 20px; }

  .status-bar { display: flex; gap: 1px; background: #222; border: 1px solid #222; border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
  .status-item { flex: 1; background: #111; padding: 12px 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.running { background: #00ff88; animation: pulse 1.5s ease-in-out infinite; }
  .status-dot.idle { background: #555; }
  .status-text { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .status-text.running { color: #00ff88; }
  .status-text.idle { color: #666; }
  .status-name { font-size: 11px; color: #999; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="status-bar">
  <div class="status-item">
    <div class="status-dot running"></div>
    <span class="status-name">Engage</span>
    <span class="status-text running">Running</span>
  </div>
  <div class="status-item">
    <div class="status-dot idle"></div>
    <span class="status-name">Grow</span>
    <span class="status-text idle">Idle</span>
  </div>
  <div class="status-item">
    <div class="status-dot idle"></div>
    <span class="status-name">Clean Up</span>
    <span class="status-text idle">Idle</span>
  </div>
</div>

</body>
</html>
