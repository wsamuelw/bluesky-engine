<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status V1 — Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'JetBrains Mono', monospace; padding: 20px; }

  .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .status-card { background: #111; border: 1px solid #222; border-radius: 4px; padding: 16px; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.running { background: #00ff88; animation: pulse 1.5s ease-in-out infinite; }
  .status-dot.idle { background: #555; }
  .status-info { }
  .status-name { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .status-state { font-size: 11px; margin-top: 2px; }
  .status-state.running { color: #00ff88; }
  .status-state.idle { color: #666; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="status-grid">
  <div class="status-card">
    <div class="status-dot running"></div>
    <div class="status-info">
      <div class="status-name">Engage</div>
      <div class="status-state running">Running — 47/300</div>
    </div>
  </div>
  <div class="status-card">
    <div class="status-dot idle"></div>
    <div class="status-info">
      <div class="status-name">Grow</div>
      <div class="status-state idle">Idle</div>
    </div>
  </div>
  <div class="status-card">
    <div class="status-dot idle"></div>
    <div class="status-info">
      <div class="status-name">Clean Up</div>
      <div class="status-state idle">Idle</div>
    </div>
  </div>
</div>

</body>
</html>
