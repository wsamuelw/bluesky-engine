<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status V3 — Sidebar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'JetBrains Mono', monospace; display: flex; min-height: 100vh; }

  .sidebar { width: 200px; background: #111; border-right: 1px solid #222; padding: 20px 16px; }
  .brand { font-size: 14px; font-weight: 700; color: #00d4ff; margin-bottom: 32px; }

  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 4px; cursor: pointer; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; }
  .nav-item .dot.running { background: #00ff88; animation: pulse 1.5s ease-in-out infinite; }
  .nav-item .dot.idle { background: transparent; }
  .nav-item .label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .nav-item .label.active { color: #00d4ff; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">bluesky-engine</div>
  <div class="nav-item">
    <div class="dot idle"></div>
    <div class="label">Dashboard</div>
  </div>
  <div class="nav-item">
    <div class="dot running"></div>
    <div class="label active">Engage</div>
  </div>
  <div class="nav-item">
    <div class="dot idle"></div>
    <div class="label">Grow</div>
  </div>
  <div class="nav-item">
    <div class="dot idle"></div>
    <div class="label">Clean Up</div>
  </div>
</div>

</body>
</html>
