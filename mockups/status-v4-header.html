<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status V4 — Header Badges</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'JetBrains Mono', monospace; padding: 20px; }

  .header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .header h1 { font-size: 14px; color: #999; text-transform: uppercase; letter-spacing: 2px; }
  .badges { display: flex; gap: 8px; }
  .badge { font-size: 10px; padding: 4px 10px; border-radius: 2px; display: flex; align-items: center; gap: 6px; }
  .badge.running { background: #00ff8815; color: #00ff88; border: 1px solid #00ff8833; }
  .badge.idle { background: #222; color: #666; border: 1px solid #333; }
  .badge .dot { width: 4px; height: 4px; border-radius: 50%; }
  .badge .dot.running { background: #00ff88; animation: pulse 1.5s ease-in-out infinite; }
  .badge .dot.idle { background: #666; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard</h1>
  <div class="badges">
    <div class="badge running">
      <div class="dot running"></div>
      ENGAGE
    </div>
    <div class="badge idle">
      <div class="dot idle"></div>
      GROW
    </div>
    <div class="badge idle">
      <div class="dot idle"></div>
      CLEAN UP
    </div>
  </div>
</div>

</body>
</html>
