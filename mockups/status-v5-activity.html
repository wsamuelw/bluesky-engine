<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status V5 — Activity Feed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #c8c8c8; font-family: 'JetBrains Mono', monospace; padding: 20px; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 12px; }

  .activity-feed { background: #111; border: 1px solid #222; border-radius: 4px; margin-bottom: 24px; }
  .activity-header { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
  .activity-header .title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #666; }
  .activity-header .status { font-size: 10px; padding: 2px 8px; border-radius: 2px; }
  .activity-header .status.live { background: #00ff8815; color: #00ff88; }
  .activity-header .status.idle { background: #222; color: #666; }
  .activity-body { padding: 16px; }

  .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
  .activity-item:last-child { border-bottom: none; }
  .activity-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; }
  .activity-dot.running { background: #00ff88; animation: pulse 1.5s ease-in-out infinite; }
  .activity-dot.idle { background: #555; }
  .activity-dot.error { background: #ff4444; }
  .activity-content { flex: 1; }
  .activity-text { font-size: 12px; color: #888; }
  .activity-text strong { color: #c8c8c8; }
  .activity-time { font-size: 10px; color: #555; margin-top: 2px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>

<div class="section-title">Bot Activity</div>

<div class="activity-feed">
  <div class="activity-header">
    <div class="title">Recent Activity</div>
    <div class="status live">● LIVE</div>
  </div>
  <div class="activity-body">
    <div class="activity-item">
      <div class="activity-dot running"></div>
      <div class="activity-content">
        <div class="activity-text"><strong>ENGAGE</strong> — Liked 47/300 posts</div>
        <div class="activity-time">Running · 2 min ago</div>
      </div>
    </div>
    <div class="activity-item">
      <div class="activity-dot idle"></div>
      <div class="activity-content">
        <div class="activity-text"><strong>GROW</strong> — Completed · 12 followed</div>
        <div class="activity-time">1 hour ago</div>
      </div>
    </div>
    <div class="activity-item">
      <div class="activity-dot error"></div>
      <div class="activity-content">
        <div class="activity-text"><strong>CLEAN UP</strong> — Failed · Rate limited</div>
        <div class="activity-time">3 hours ago</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
